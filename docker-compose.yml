version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/maali_mentor.db:/app/maali_mentor.db
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///./maali_mentor.db
      - USE_MOCK_SPEECH=false
      - USE_MOCK_LLM=false
      # Overwrite GEMINI_API_KEY inside .env or override here:
      # - GEMINI_API_KEY=your-gemini-key
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always
